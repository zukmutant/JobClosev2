services:
  postgres:
    image: postgres:16
    container_name: jobclose-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobclose
      POSTGRES_USER: jobclose
      POSTGRES_PASSWORD: jobclose_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobclose -d jobclose"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
